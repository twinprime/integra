pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Write temp files to /tmp so nginx can run as non-root
        client_body_temp_path /tmp/nginx/client_body;
        proxy_temp_path        /tmp/nginx/proxy;
        fastcgi_temp_path      /tmp/nginx/fastcgi;
        uwsgi_temp_path        /tmp/nginx/uwsgi;
        scgi_temp_path         /tmp/nginx/scgi;

        # Serve pre-compressed assets if available
        gzip_static on;

        # Cache static assets aggressively (Vite hashes filenames)
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|svg|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Serve YAML model files directly — must come before the /models/ SPA fallback
        location ~* ^/models/.*\.yaml$ {
            add_header Cache-Control "no-cache";
        }

        # All other /models/<id> requests → SPA (no extension = React route)
        location /models/ {
            try_files $uri /index.html;
        }

        # SPA fallback: unknown paths return index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Never cache index.html so the browser always fetches the latest shell
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}