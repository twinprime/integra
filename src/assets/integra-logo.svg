  <line x1="9" y1="13" x2="5.5" y2="18.25" stroke="#d1d5db" stroke-width="1.75" stroke-linecap="round"/>
  <line x1="15" y1="13" x2="18.5" y2="18.25" stroke="#d1d5db" stroke-width="1.75" stroke-linecap="round"/>
