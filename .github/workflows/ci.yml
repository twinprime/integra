name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:run

  # E2E tests (Playwright) are intentionally excluded from this job.
  # They require a running dev server and browser binaries, which adds
  # significant setup complexity. Add a separate job with `npm run test:e2e`
  # once you have a strategy for spinning up the dev server in CI
  # (e.g. using `vite preview` after build, or a dedicated service container).
